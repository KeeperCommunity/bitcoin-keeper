appId: io.hexawallet.keeper.development
---

- launchApp

# ---- Create Passcode ----
- assertVisible:
    id: key_1

- repeat:
    times: 8
    commands:
      - tapOn:
          id: key_1

- assertVisible: "Create"
- tapOn: "Create"

# ---- Remember Passcode ----
- assertVisible: "Remember your passcode"
- tapOn: "Continue"

# ---- Biometric ----
- assertVisible: "Enable Biometric Authentication"
- tapOn: "Cancel"

# ---- Onboarding Carousel ----
- assertVisible: "Create wallets"

- swipe:
    direction: LEFT

- assertVisible: "Manage keys"

- swipe:
    direction: LEFT

- assertVisible: "Plan for Inheritance"

- tapOn: "See FAQs"
- pressKey: back

# ---- Get Started ----
- assertVisible: "Get Started"
- tapOn: "Get Started"

# ---- Welcome ----
- assertVisible: "Welcome to Bitcoin Keeper"
- tapOn: "Start New"

- assertVisible: "Next"
- tapOn: "Next"

- assertVisible: "Home"